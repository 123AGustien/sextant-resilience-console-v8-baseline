name: Sextant Console Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate core files exist
        run: |
          echo "Checking Sextant Control Room structure..."

          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html missing"
            exit 1
          fi

          if [ ! -d "core_engine" ]; then
            echo "WARNING: core_engine folder missing"
          fi

          if [ ! -f "simulator.html" ]; then
            echo "WARNING: simulator.html missing"
          fi

          echo "Structure validation complete"

      - name: Validate system folders
        run: |
          for dir in core_engine dashboard assets backend cognitive_core; do
            if [ -d "$dir" ]; then
              echo "$dir exists"
            else
              echo "WARNING: $dir missing"
            fi
          done

      - name: Final status report
        run: |
          echo "Sextant Validation Pipeline Completed"
          echo "System baseline appears operational"
