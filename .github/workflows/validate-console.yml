name: Sextant Console Validation Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  # ✅ THIS ENABLES MANUAL RUN BUTTON
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate core files exist
        run: |
          echo "Running manual/auto validation..."

          if [ ! -f "index.html" ]; then
            echo "ERROR: index.html missing"
            exit 1
          fi

          if [ ! -d "core_engine" ]; then
            echo "WARNING: core_engine folder missing"
          fi

          if [ ! -f "simulator.html" ]; then
            echo "WARNING: simulator.html missing"
          fi

          echo "Validation complete"

      - name: Folder integrity check
        run: |
          for dir in core_engine dashboard assets backend cognitive_core; do
            if [ -d "$dir" ]; then
              echo "OK: $dir exists"
            else
              echo "WARNING: $dir missing"
            fi
          done

      - name: System status
        run: |
          echo "Sextant baseline validation finished successfully"
